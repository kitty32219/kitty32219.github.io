<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>臨床診斷學 - 綜合管理系統</title>
    <style>
        /* Muji 簡約風格與共用樣式 */
        body { 
            font-family: "Helvetica Neue", Helvetica, Arial, "PingFang TC", "Heiti TC", "Microsoft JhengHei", sans-serif; 
            background-color: #f7f7f7; 
            padding: 20px; 
            line-height: 1.6; 
            color: #333;
            margin: 0;
        }
        .container { 
            max-width: 800px; 
            margin: 20px auto; 
            background: white; 
            padding: 2rem; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
        }
        h2 { 
            color: #555; 
            font-weight: 300;
            text-align: center; 
            margin-bottom: 30px;
        }
        
        /* 分頁按鈕樣式 */
        .tabs {
            display: flex;
            justify-content: center;
            margin-bottom: 25px;
            border-bottom: 1px solid #e0e0e0;
        }
        .tab-btn {
            padding: 12px 30px;
            cursor: pointer;
            border: none;
            background: none;
            font-size: 1rem;
            color: #aaa;
            transition: 0.3s;
            outline: none;
        }
        .tab-btn.active {
            color: #8c7e7e;
            border-bottom: 2px solid #8c7e7e;
            font-weight: bold;
        }

        /* 分頁內容控制 */
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* 調課提醒樣式 */
        .date-info { font-size: 1.1rem; margin-bottom: 20px; color: #666; text-align: center; }
        .alert-box { padding: 15px; border-radius: 8px; margin-top: 10px; border: 1px solid transparent; }
        .warning { background-color: #fff3cd; border-left: 5px solid #ffca28; color: #856404; }
        .no-alert { background-color: #e8f5e9; border-left: 5px solid #28a745; color: #155724; }
        .course-detail { font-weight: bold; color: #d32f2f; }

        /* 影片列表樣式 (Muji Style) */
        .course-list { display: grid; gap: 20px; }
        .course-item { 
            background: #fff; padding: 25px; border-radius: 4px; 
            border: 1px solid #e0e0e0; transition: border-color 0.2s; 
        }
        .course-item:hover { border-color: #aaa; }
        .week-title { font-size: 1.2rem; font-weight: 500; margin-bottom: 10px; color: #8c7e7e; }
        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; margin-top: 15px; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 2px; border: none; }
        .status-tag { display: inline-block; padding: 2px 10px; font-size: 0.8rem; border-radius: 10px; background: #eee; color: #888; }
        .status-online { background: #e8f5e9; color: #4caf50; }
    </style>
</head>
<body>

<div class="container">
    <h2>臨床診斷學</h2>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab(event, 'videos')">課程影片</button>
        <button class="tab-btn" onclick="switchTab(event, 'reminder')">調課提醒</button>
    </div>

    <div id="videos" class="tab-content active">
        <div class="course-list" id="videoList">
            <div class="course-item">
                <div class="week-title">第一週：課程導論與基礎</div>
                <span class="status-tag status-online">● 已上線</span>
                <div class="video-wrapper">
                    <iframe src="https://www.youtube.com/embed/2Ur-9DSLRTw" allowfullscreen></iframe>
                </div>
            </div>
                <div class="course-item">
                <div class="week-title">第二週：你想輸入的標題</div>
                <span class="status-tag status-online">● 已上線</span>
                <div class="video-wrapper">
                    <iframe src="https://www.youtube.com/embed/新影片的ID" allowfullscreen></iframe>
                </div>
            </div>
            </div>
    </div>

    <div id="reminder" class="tab-content">
        <div class="date-info" id="currentDateDisplay">今天是：載入中...</div>
        <div id="alertContainer"></div>
    </div>
</div>

<script>
    // --- 分頁切換邏輯 ---
    function switchTab(event, tabId) {
        // 隱藏所有內容，移除所有按鈕高亮
        document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        
        // 顯示指定的內容
        document.getElementById(tabId).classList.add('active');
        // 設定目前的按鈕為 active
        event.currentTarget.classList.add('active');
    }

    // --- 調課資料表 ---
    const scheduleChanges = [
        { original: "2026/03/05", newDate: "2026/03/05", subject: "心血管系統", teacher: "徐中和", note: "9A節(互助4A02)" },
        { original: "2026/03/12", newDate: "2026/03/19", subject: "皮膚病兆", teacher: "張廖年峰", note: "78節(原林慎智老師時段)" },
        { original: "2026/03/19", newDate: "2026/03/19", subject: "心血管系統-心臟", teacher: "林慎智", note: "9A節(互助4A02)" },
        { original: "2026/03/26", newDate: "2026/03/05", subject: "呼吸系統", teacher: "夏德椿", note: "78節(原徐中和老師時段)" },
        { original: "2026/04/09", newDate: "2026/04/08", subject: "臨床風濕免疫疾病", teacher: "黃春明", note: "9A節(互助4A02)" },
        { original: "2026/04/30", newDate: "2026/04/29", subject: "耳鼻喉科疾病", teacher: "黃得韻", note: "9A節(互助4A02)" },
        { original: "2026/05/14", newDate: "2026/05/12", subject: "內分泌及代謝系統", teacher: "邱依婷", note: "9A節(互助4A02)" },
        { original: "2026/06/11", newDate: "2026/06/03", subject: "血液腫瘤科", teacher: "林振源", note: "9A節(互助4A02)" }
    ];

    // --- 檢查提醒邏輯 ---
    function checkReminders() {
        const now = new Date();
        now.setHours(0, 0, 0, 0);
        const displayDate = `${now.getFullYear()}/${now.getMonth() + 1}/${now.getDate()}`;
        document.getElementById('currentDateDisplay').innerText = `今天是：${displayDate}`;

        const alertContainer = document.getElementById('alertContainer');
        let hasAlert = false;

        scheduleChanges.forEach(item => {
            const courseDate = new Date(item.newDate);
            const timeDiff = courseDate - now;
            const daysDiff = Math.round(timeDiff / (1000 * 60 * 60 * 24));

            if (daysDiff >= 0 && daysDiff <= 7) {
                hasAlert = true;
                const div = document.createElement('div');
                div.className = 'alert-box warning';
                div.style.marginBottom = "15px";
                div.innerHTML = `
                    ⚠️ <b>調課提醒：${daysDiff === 0 ? '今天！' : daysDiff + '天後'}</b><br>
                    科目：<span class="course-detail">${item.subject}</span> (${item.teacher} 老師)<br>
                    時間：${item.newDate} ${item.note}
                `;
                alertContainer.appendChild(div);
            }
        });

        if (!hasAlert) {
            alertContainer.innerHTML = '<div class="alert-box no-alert">✅ 目前 7 日內沒有調課行程。</div>';
        }
    }

    // --- 動態產生影片列表 (第 2~18 週) ---
        function generateVideoList() {
                const videoList = document.getElementById('videoList');
                
                // 不再用迴圈跑 18 次，直接新增一個簡單的狀態提示
                const div = document.createElement('div');
                div.style.textAlign = "center";
                div.style.padding = "40px 0";
                div.style.color = "#bbb";
                div.style.letterSpacing = "2px";
                div.innerHTML = `
                    <div style="font-size: 0.9rem;">— 更新中 —</div>
                `;
                videoList.appendChild(div);
            }

    // 初始化執行
    checkReminders();
    generateVideoList();
</script>

</body>
</html>
