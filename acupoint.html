<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>面部穴位導航系統 (精準定位版)</title>
  <style>
    body, html { 
      margin: 0; 
      padding: 0; 
      width: 100%; 
      height: 100%; 
      background: #000; 
      overflow: hidden; 
    }
    #container { 
      position: relative; 
      width: 100vw; 
      height: 100vh; 
    }
    video, canvas { 
      position: absolute; 
      top: 0; 
      left: 0; 
      width: 100%; 
      height: 100%; 
      object-fit: cover; 
      /* 水平鏡像翻轉，符合視覺直覺 */
      transform: scaleX(-1); 
    }
    #status { 
      position: absolute; 
      top: 20px; 
      left: 50%; 
      transform: translateX(-50%); 
      background: rgba(0,0,0,0.8); 
      color: #fff; 
      padding: 10px 20px; 
      border-radius: 20px; 
      font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
      font-size: 14px; 
      z-index: 99; 
      text-align: center; 
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }
  </style>
</head>
<body>
  <div id="container">
    <div id="status">⏳ 正在初始化 AI 模型與相機...</div>
    <video id="webcam" playsinline></video>
    <canvas id="output_canvas"></canvas>
  </div>

  <!-- 使用原生 ES Module 匯入 MediaPipe Vision -->
  <script type="module">
    import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

    const video = document.getElementById("webcam");
    const canvas = document.getElementById("output_canvas");
    const ctx = canvas.getContext("2d");
    const status = document.getElementById("status");

    let faceLandmarker;
    let lastVideoTime = -1;

    async function setup() {
      try {
        // 1. 初始化資源
        const vision = await FilesetResolver.forVisionTasks(
          "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"
        );
        
        faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
          baseOptions: {
            modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
            delegate: "GPU" // 啟用手機 GPU 加速
          },
          runningMode: "VIDEO",
          numFaces: 1
        });

        status.innerText = "🎥 請允許存取相機...";

        // 2. 啟動 iPhone 前鏡頭
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "user", width: { ideal: 1280 }, height: { ideal: 720 } },
          audio: false
        });
        
        video.srcObject = stream;
        await video.play();

        status.style.display = "none";
        renderLoop();

      } catch (err) {
        status.innerHTML = "❌ 發生錯誤：" + err.message + "<br>請確保使用 HTTPS 連線並允許相機權限。";
      }
    }

    function renderLoop() {
      // 自動同步 Canvas 與 Video 的解析度
      if (canvas.width !== video.videoWidth || canvas.height !== video.videoHeight) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
      }

      if (video.currentTime !== lastVideoTime) {
        lastVideoTime = video.currentTime;
        const results = faceLandmarker.detectForVideo(video, performance.now());

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (results.faceLandmarks && results.faceLandmarks.length > 0) {
          const landmarks = results.faceLandmarks[0];
          const w = canvas.width;
          const h = canvas.height;

          // 座標轉換小工具
          const getPt = (idx) => ({ 
            x: landmarks[idx].x * w, 
            y: landmarks[idx].y * h 
          });

          // ----------------------------------------------------
          // 🎯 1. 【印堂穴】(兩眉頭中點，垂直對齊鼻樑)
          // ----------------------------------------------------
          const lBrow = getPt(70), rBrow = getPt(300);
          const yintang = {
            x: (lBrow.x + rBrow.x) / 2,
            y: (lBrow.y + rBrow.y) / 2
          };
          drawPoint(yintang.x, yintang.y, "Yin Tang", "#FF0000");

          // ----------------------------------------------------
          // 🎯 2. 【太陽穴】(改用原生解剖特徵點：21 與 251)
          // ----------------------------------------------------
          // 21 號點為左太陽穴解剖溝槽點；251 號點為右太陽穴解剖溝槽點
          const taiyangL = getPt(21);
          const taiyangR = getPt(251);

          drawPoint(taiyangL.x, taiyangL.y, "Tai Yang (L)", "#FF00FF");
          drawPoint(taiyangR.x, taiyangR.y, "Tai Yang (R)", "#FF00FF");

          // ----------------------------------------------------
          // 🎯 3. 【迎香穴】(鼻翼溝槽特徵點：129 與 358)
          // ----------------------------------------------------
          const yxL = getPt(129), yxR = getPt(358);
          drawPoint(yxL.x, yxL.y, "Ying Xiang (L)", "#FFFF00");
          drawPoint(yxR.x, yxR.y, "Ying Xiang (R)", "#FFFF00");
        }
      }
      requestAnimationFrame(renderLoop);
    }

    // 繪製穴位點與文字標籤小工具
    function drawPoint(x, y, label, color) {
      ctx.save();
      
      // 繪製圓圈與白邊
      ctx.beginPath();
      ctx.arc(x, y, 6, 0, 2 * Math.PI);
      ctx.fillStyle = color;
      ctx.fill();
      ctx.strokeStyle = "#FFFFFF";
      ctx.lineWidth = 2;
      ctx.stroke();

      // 文字反轉修復
      ctx.font = "bold 14px sans-serif";
      ctx.fillStyle = color;
      ctx.translate(x, y);
      ctx.scale(-1, 1);
      ctx.fillText(label, -35, -10);
      
      ctx.restore();
    }

    setup();
  </script>
</body>
</html>
