<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>面部穴位即時導航系統 (iPhone Web版)</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      background-color: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    #container {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    /* 視訊畫面與畫布完全重疊 */
    video, canvas {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
      /* 水平鏡像翻轉，符合視覺直覺 */
      transform: scaleX(-1);
    }
    #loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.8);
      padding: 20px 30px;
      border-radius: 12px;
      font-size: 16px;
      text-align: center;
      z-index: 10;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    }
  </style>

  <!-- 引入 Google 官方 MediaPipe Vision Tasks SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/vision_bundle.js" crossorigin="anonymous"></script>
</head>
<body>

  <div id="container">
    <div id="loading">🚀 載入 2026 AI 面部核心模型中...</div>
    <video id="webcam" autoplay playsinline></video>
    <canvas id="output_canvas"></canvas>
  </div>

  <script>
    const { FaceLandmarker, FilesetResolver } = vision;

    const video = document.getElementById("webcam");
    const canvas = document.getElementById("output_canvas");
    const ctx = canvas.getContext("2d");
    const loading = document.getElementById("loading");

    let faceLandmarker;
    let lastVideoTime = -1;

    // 1. 初始化 FaceLandmarker AI 模型
    async function initFaceLandmarker() {
      const filesetResolver = await FilesetResolver.forVisionTasks(
        "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"
      );
      
      faceLandmarker = await FaceLandmarker.createFromOptions(filesetResolver, {
        baseOptions: {
          modelAssetPath: `https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task`,
          delegate: "GPU" // 啟用 iPhone 繪圖硬體加速
        },
        runningMode: "VIDEO",
        numFaces: 1,
        minFaceDetectionConfidence: 0.7,
        minFacePresenceConfidence: 0.7
      });

      loading.style.display = "none";
      startCamera();
    }

    // 2. 啟動 iPhone 視訊鏡頭
    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: "user", // 前置鏡頭
            width: { ideal: 1280 },
            height: { ideal: 720 }
          },
          audio: false
        });
        video.srcObject = stream;
        video.addEventListener("loadeddata", predictWebcam);
      } catch (err) {
        alert("無法存取攝影機，請確認 iPhone 的 Safari 隱私權設定與 HTTPS 環境：" + err);
      }
    }

    // 3. 即時偵測與繪製迴圈 (60 FPS)
    async function predictWebcam() {
      // 調整 Canvas 解析度與 Video 一致
      if (canvas.width !== video.videoWidth || canvas.height !== video.videoHeight) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
      }

      let startTimeMs = performance.now();
      if (lastVideoTime !== video.currentTime) {
        lastVideoTime = video.currentTime;
        const results = faceLandmarker.detectForVideo(video, startTimeMs);

        // 清空舊畫面
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (results.faceLandmarks && results.faceLandmarks.length > 0) {
          const landmarks = results.faceLandmarks[0];
          const imgW = canvas.width;
          const imgH = canvas.height;

          // 座標轉換小工具
          const getPixelCoord = (idx) => {
            const lm = landmarks[idx];
            return { x: lm.x * imgW, y: lm.y * imgH };
          };

          try {
            // ----------------------------------------------------
            // 🎯 1. 【印堂穴】: 左眉頭(70) 與 右眉頭(300) 之中點
            // ----------------------------------------------------
            const lBrow = getPixelCoord(70);
            const rBrow = getPixelCoord(300);
            const yintang = {
              x: (lBrow.x + rBrow.x) / 2,
              y: (lBrow.y + rBrow.y) / 2
            };
            drawAcupoint(yintang.x, yintang.y, "Yin Tang", "#FF0000");

            // ----------------------------------------------------
            // 🎯 2. 【太陽穴】: 向量延伸 1.8 倍
            // ----------------------------------------------------
            // [左太陽穴]：眼尾(33) -> 外眼眶(139)
            const p33 = getPixelCoord(33);
            const p139 = getPixelCoord(139);
            const vecLx = p139.x - p33.x;
            const vecLy = p139.y - p33.y;
            const taiyangL = {
              x: p33.x + vecLx * 1.8,
              y: p33.y + vecLy * 1.8
            };
            drawAcupoint(taiyangL.x, taiyangL.y, "Tai Yang (L)", "#FF00FF");

            // [右太陽穴]：眼尾(263) -> 外眼眶(368)
            const p263 = getPixelCoord(263);
            const p368 = getPixelCoord(368);
            const vecRx = p368.x - p263.x;
            const vecRy = p368.y - p263.y;
            const taiyangR = {
              x: p263.x + vecRx * 1.8,
              y: p263.y + vecRy * 1.8
            };
            drawAcupoint(taiyangR.x, taiyangR.y, "Tai Yang (R)", "#FF00FF");

            // ----------------------------------------------------
            // 🎯 3. 【迎香穴】: 鼻翼溝點 (129, 358)
            // ----------------------------------------------------
            const yingxiangL = getPixelCoord(129);
            const yingxiangR = getPixelCoord(358);
            drawAcupoint(yingxiangL.x, yingxiangL.y, "Ying Xiang (L)", "#FFFF00");
            drawAcupoint(yingxiangR.x, yingxiangR.y, "Ying Xiang (R)", "#FFFF00");

          } catch (e) {
            console.error(e);
          }
        }
      }

      // 持續請求下一個動畫影格
      window.requestAnimationFrame(predictWebcam);
    }

    // 4. 畫穴位點與標籤（自動處理文字反轉修正）
    function drawAcupoint(x, y, text, color) {
      ctx.save();
      
      // 畫圓點
      ctx.beginPath();
      ctx.arc(x, y, 7, 0, 2 * Math.PI);
      ctx.fillStyle = color;
      ctx.fill();
      ctx.lineWidth = 2;
      ctx.strokeStyle = "#FFFFFF";
      ctx.stroke();

      // 畫標籤（因為 Canvas 整體有 mirror 效果，文字需要反向翻轉回正，否則手機上文字會是相反的）
      ctx.font = "bold 16px sans-serif";
      ctx.fillStyle = color;
      
      ctx.translate(x, y);
      ctx.scale(-1, 1); // 將文字翻轉回正確方向
      ctx.fillText(text, -40, -12);

      ctx.restore();
    }

    // 啟動系統
    initFaceLandmarker();
  </script>
</body>
</html>
